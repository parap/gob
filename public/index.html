<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project GOB</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>

<!-- Top bar (only shown in-game) -->
<header id="topbar" class="hidden">
    <span class="brand">GOB</span>
    <div id="topbar-resources">
        <span class="res"><b>Gold</b> <span id="res-gold">0</span></span>
        <span class="res"><b>Wood</b> <span id="res-wood">0</span></span>
        <span class="res"><b>Stone</b> <span id="res-stone">0</span></span>
    </div>
    <span class="spacer"></span>
    <span id="topbar-username"></span>
    <button id="btn-logout" class="btn-ghost">Log out</button>
</header>

<!-- Auth screen -->
<main id="screen-auth" class="screen hidden">
    <div class="card">
        <h1>Project GOB</h1>
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Log in</button>
            <button class="auth-tab" data-tab="register">Register</button>
        </div>

        <div class="auth-form active" data-form="login">
            <input id="login-username" placeholder="Username" autocomplete="username">
            <input id="login-password" type="password" placeholder="Password" autocomplete="current-password">
            <button id="btn-login" class="btn">Log in</button>
        </div>

        <div class="auth-form" data-form="register">
            <input id="reg-username" placeholder="Username" autocomplete="username">
            <input id="reg-email" type="email" placeholder="Email" autocomplete="email">
            <input id="reg-password" type="password" placeholder="Password (min 6)" autocomplete="new-password">
            <button id="btn-register" class="btn">Create account</button>
        </div>

        <p id="auth-error" class="error"></p>
    </div>
</main>

<!-- Game screen -->
<main id="screen-game" class="screen hidden">
    <div class="game-grid">
        <div class="card">
            <h2 id="settlement-name">—</h2>
            <p class="muted">Terrain: <span id="settlement-terrain">—</span></p>
            <table class="res-table">
                <tr><th>Resource</th><th>Amount</th><th>Per hour</th></tr>
                <tr><td>Gold</td>  <td id="g-gold">0</td>  <td id="rate-gold">0</td></tr>
                <tr><td>Wood</td>  <td id="g-wood">0</td>  <td id="rate-wood">0</td></tr>
                <tr><td>Stone</td> <td id="g-stone">0</td> <td id="rate-stone">0</td></tr>
            </table>
        </div>

        <div class="card">
            <h2 id="char-name">—</h2>
            <div class="loot-bar">
                <button id="btn-loot" class="btn">Search for loot</button>
                <span id="loot-result" class="muted"></span>
            </div>
            <div id="char-vitals" class="vitals"></div>
            <h3>Stats</h3>
            <div id="char-stats" class="stat-grid"></div>
            <h3>Combat</h3>
            <div id="char-substats" class="stat-grid"></div>
            <h3>Skills</h3>
            <div id="char-skills" class="skill-list"></div>
            <h3>Equipment</h3>
            <div id="char-equipment" class="slot-grid"></div>
            <h3>Backpack</h3>
            <div id="char-inventory" class="inv-list"></div>
        </div>
    </div>
</main>

<script src="/js/core.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/game.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
